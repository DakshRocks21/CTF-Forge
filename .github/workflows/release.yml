name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: ctf-forge-linux-x86_64
          - os: macos-latest
            asset: ctf-forge-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Verify build is releasable
        run: |
          ruff check ctf_forge tests
          mypy
          pytest -v
      - name: Build binary
        run: ./scripts/build.sh
      - name: Rename binary
        run: mv dist/ctf-forge dist/${{ matrix.asset }}
      - name: Smoke-test binary
        run: ./dist/${{ matrix.asset }} --version
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
